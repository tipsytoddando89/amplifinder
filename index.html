<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplifier Selector</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0d0f14;--surface:#16191f;--surface2:#1e2229;--border:#2a2e38;--accent:#4d9ef6;--text:#f0ede8;--muted:#7a8090;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
  .phone-wrap{max-width:420px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;padding-bottom:90px;}
  .phone-wrap::before{content:'';position:absolute;top:-120px;right:-120px;width:380px;height:380px;background:radial-gradient(circle,rgba(77,158,246,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .phone-wrap::after{content:'';position:absolute;bottom:0;left:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(77,158,246,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .content{position:relative;z-index:1;}
  .header{padding:2rem 1.5rem 1rem;border-bottom:1px solid var(--border);}
  .header-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:8px;}
  .header-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.2;color:var(--text);font-weight:400;}
  .header-title em{color:var(--accent);font-style:normal;}
  .header-sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:300;}
  .progress-bar{height:2px;background:var(--border);}
  .progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease;width:0%;}
  .steps{padding:1.25rem 1.5rem;}
  .step-inner{padding:1rem 0;border-bottom:1px solid var(--border);}
  .step-inner:last-child{border-bottom:none;}
  .step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .step-num{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-weight:500;}
  .step-num.done{color:var(--accent);}
  .change-btn{font-size:11px;color:var(--accent);background:none;border:1px solid rgba(77,158,246,0.3);cursor:pointer;padding:2px 8px;border-radius:20px;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;transition:all 0.15s;}
  .change-btn:hover{background:rgba(77,158,246,0.1);}
  .btn-group{display:flex;flex-wrap:wrap;gap:8px;}
  .btn-opt{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:8px;padding:10px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:400;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em;}
  .btn-opt:hover{border-color:var(--accent);color:var(--accent);}
  .btn-opt.active{background:var(--accent);color:#ffffff;border-color:var(--accent);font-weight:500;}
  .btn-cat{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:8px;padding:10px 12px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:400;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em;display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:calc(50% - 4px);}
  .btn-cat img{width:48px;height:48px;object-fit:contain;opacity:0.85;transition:opacity 0.15s;}
  .btn-cat:hover{border-color:var(--accent);color:var(--accent);}
  .btn-cat:hover img{opacity:1;}
  .btn-cat.active{background:rgba(77,158,246,0.12);color:var(--accent);border-color:var(--accent);font-weight:500;}
  .btn-cat.active img{opacity:1;}
  #g-cat{display:flex;flex-wrap:wrap;gap:8px;}
  .result-wrap{padding:0 1.5rem 1rem;}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;position:relative;overflow:hidden;}
  .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .result-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .result-amps{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
  .amp-pill{background:rgba(77,158,246,0.12);border:1px solid rgba(77,158,246,0.3);color:var(--accent);font-family:'DM Serif Display',serif;font-size:22px;padding:8px 18px;border-radius:10px;letter-spacing:0.02em;}
  .result-divider{height:1px;background:var(--border);margin:1rem 0;}
  .result-meta{display:flex;flex-wrap:wrap;gap:12px 20px;}
  .meta-item{font-size:12px;color:var(--muted);}
  .meta-item span{color:var(--text);font-weight:500;display:block;font-size:13px;margin-top:1px;}
  .combo-note{font-size:11px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .sug-sub{margin-top:1rem;padding:10px 14px;background:rgba(77,158,246,0.07);border:1px solid rgba(77,158,246,0.2);border-radius:10px;}
  .sug-sub-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .sug-sub-options{display:flex;gap:8px;}
  .sug-sub-option{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
  .sug-sub-option-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .sug-sub-pills{display:flex;flex-wrap:wrap;gap:5px;}
  .sug-sub-pill{background:rgba(77,158,246,0.15);border:1px solid rgba(77,158,246,0.3);color:var(--accent);font-size:13px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;}
  .sug-sub-pill:hover{background:rgba(77,158,246,0.28);border-color:var(--accent);}
  .sug-sub-pill::after{content:'›';font-size:15px;opacity:0.7;}
  .sub-detail-page{position:fixed;top:0;left:50%;transform:translateX(100%) translateX(-50%);width:100%;max-width:420px;bottom:0;background:var(--bg);z-index:200;transition:transform 0.32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
  .sub-detail-page.open{transform:translateX(-50%);}
  .sub-detail-page::before{content:'';position:absolute;top:-120px;right:-120px;width:380px;height:380px;background:radial-gradient(circle,rgba(77,158,246,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .sub-detail-header{position:relative;z-index:1;padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);}
  .sub-detail-back{background:none;border:none;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.04em;padding:0;margin-bottom:12px;opacity:0.85;transition:opacity 0.15s;}
  .sub-detail-back:hover{opacity:1;}
  .sub-detail-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .sub-detail-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .sub-detail-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);font-weight:400;}
  .sub-detail-divider{height:2px;background:linear-gradient(90deg,var(--accent),transparent);margin:0;}
  .sub-detail-content{position:relative;z-index:1;flex:1;padding:1.5rem;overflow-y:auto;}
  .amp-product-img{height:46px;flex:1;min-width:0;border-radius:6px;object-fit:contain;object-position:center;background:var(--surface2);border:1px solid var(--border);}
  .amp-combo-imgs{display:flex;flex-direction:column;gap:6px;flex-basis:100%;margin-top:2px;}
  .amp-product-img-sm{height:34px;flex:1;min-width:0;border-radius:6px;object-fit:contain;object-position:center;background:var(--surface2);border:1px solid var(--border);}
  .bottom-toolbar{position:sticky;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:12px 1.5rem;display:flex;flex-direction:column;gap:8px;z-index:10;max-width:420px;margin:0 auto;}
  .toolbar-row{display:flex;gap:10px;}
  .tool-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.04em;padding:11px 16px;border-radius:10px;cursor:pointer;transition:all 0.15s;}
  .tool-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .tool-btn:disabled{opacity:0.25;pointer-events:none;}
  .tool-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .reset-btn:hover:not(:disabled){border-color:#c0464a;color:#c0464a;}
  .add-project-btn{width:100%;display:none;align-items:center;justify-content:center;gap:8px;background:var(--accent);border:1px solid var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.04em;padding:13px 16px;border-radius:10px;cursor:pointer;transition:all 0.15s;}
  .add-project-btn:hover{background:#3d8ee6;border-color:#3d8ee6;}
  .add-project-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .fadein{animation:fadeUp 0.25s ease forwards;}
  @keyframes popIn{0%{transform:scale(0.7);opacity:0;}70%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
  .header-wrap{position:relative;}
  .house-btn{position:absolute;top:50%;right:0;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);transition:color 0.15s;display:flex;align-items:center;justify-content:center;}
  .house-btn:hover{color:var(--accent);}
  .house-btn svg{width:26px;height:26px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .house-badge{position:absolute;top:-2px;right:-2px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;min-width:17px;height:17px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:1;animation:popIn 0.25s ease;}
  .project-panel{position:fixed;top:0;left:50%;transform:translateX(100%) translateX(-50%);width:100%;max-width:420px;bottom:0;background:var(--bg);z-index:200;transition:transform 0.32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
  .project-panel.open{transform:translateX(-50%);}
  .project-panel::before{content:'';position:absolute;top:-120px;right:-120px;width:380px;height:380px;background:radial-gradient(circle,rgba(77,158,246,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .project-header{position:relative;z-index:1;padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);}
  .project-back{background:none;border:none;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.04em;padding:0;margin-bottom:12px;opacity:0.85;transition:opacity 0.15s;}
  .project-back:hover{opacity:1;}
  .project-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .project-eyebrow{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .project-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);font-weight:400;}
  .project-divider{height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .project-content{position:relative;z-index:1;flex:1;padding:1.25rem 1.5rem;overflow-y:auto;}
  .project-empty{text-align:center;color:var(--muted);font-size:13px;margin-top:3rem;line-height:1.6;}
  .project-empty svg{width:40px;height:40px;stroke:var(--border);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:12px;}
  .project-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1rem 1rem 1rem;margin-bottom:10px;position:relative;overflow:hidden;}
  .project-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .project-item-amp{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);margin-bottom:6px;}
  .project-item-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px 14px;}
  .project-item-meta span{color:var(--text);font-weight:500;}
  .project-item-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;transition:color 0.15s;display:flex;}
  .project-item-remove:hover{color:#c0464a;}
  .project-item-remove svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
  .project-summary{background:rgba(77,158,246,0.06);border:1px solid rgba(77,158,246,0.22);border-radius:12px;padding:1rem 1.1rem;margin-bottom:14px;position:relative;overflow:hidden;}
  .project-summary::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .project-summary-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .project-summary-pills{display:flex;flex-wrap:wrap;gap:8px;}
  .project-summary-pill{background:rgba(77,158,246,0.12);border:1px solid rgba(77,158,246,0.3);color:var(--accent);font-family:'DM Serif Display',serif;font-size:20px;padding:5px 15px;border-radius:8px;letter-spacing:0.02em;}
  .project-summary-merged-note{font-size:11px;color:var(--muted);margin-top:8px;opacity:0.7;}
  .project-zones-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:4px;}
/* Wiring diagram */
.wiring-panel{position:fixed;top:0;left:50%;transform:translateX(100%) translateX(-50%);width:100%;max-width:420px;bottom:0;background:var(--bg);z-index:300;transition:transform 0.32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
.wiring-panel.open{transform:translateX(-50%);}
#wiring-root .react-flow__background{fill:var(--bg)!important;}
#wiring-root .react-flow__attribution{display:none!important;}
#wiring-root .react-flow__controls{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:8px!important;overflow:hidden!important;box-shadow:none!important;}
#wiring-root .react-flow__controls-button{background:var(--surface)!important;border-bottom-color:var(--border)!important;fill:var(--muted)!important;}
#wiring-root .react-flow__controls-button:hover{background:var(--surface2)!important;}
.wiring-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:12px;padding:11px 16px;border:1px solid rgba(77,158,246,0.28);background:rgba(77,158,246,0.05);border-radius:10px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.03em;transition:background 0.15s;}
.wiring-btn:active{background:rgba(77,158,246,0.13);}
.wiring-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="phone-wrap">
  <div class="content">
    <div class="header header-wrap">
      <img src="/assests/OA-PRO_AmpliFINDER_Logo_Vector_Final_08-29-25-TM-04.png" alt="AmpliFinder" style="height:68px;width:auto;display:block;margin:0 auto 8px;">
      <div class="header-sub" style="text-align:center;">Answer each question to get your recommendation.</div>
      <button class="house-btn" id="house-btn" onclick="openProject()">
        <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
        <span class="house-badge" id="house-badge">0</span>
      </button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="steps">
      <div class="step" id="s-cat">
        <div class="step-inner">
          <div class="step-header"><span class="step-num" id="n-cat">01 — Category</span></div>
          <div id="g-cat">
            <button class="btn-cat" data-val="Design Centric"><img src="/assests/logo-design.svg" alt="">Design Centric</button>
            <button class="btn-cat" data-val="Landscape"><img src="/assests/logo-landscape.svg" alt="">Landscape</button>
            <button class="btn-cat" data-val="Soundbars"><img src="/assests/logo-soundbars.svg" alt="">Sound Bars</button>
            <button class="btn-cat" data-val="Performance & Theater"><img src="/assests/logo-performance.svg" alt="">Performance &amp; Theater</button>
            <button class="btn-cat" data-val="Architectural Speakers"><img src="/assests/logo-architectural.svg" alt="">Architectural</button>
          </div>
        </div>
      </div>
      <div class="step" id="s-prod" style="display:none;">
        <div class="step-inner">
          <div class="step-header"><span class="step-num" id="n-prod">02 — Product</span><button class="change-btn" onclick="resetFrom('s-prod')">change</button></div>
          <div class="btn-group" id="g-prod"></div>
        </div>
      </div>
      <div class="step" id="s-ohm" style="display:none;">
        <div class="step-inner">
          <div class="step-header"><span class="step-num" id="n-ohm">— Connection type</span><button class="change-btn" onclick="resetFrom('s-ohm')">change</button></div>
          <div class="btn-group" id="g-ohm"></div>
        </div>
      </div>
      <div class="step" id="s-spk" style="display:none;">
        <div class="step-inner">
          <div class="step-header"><span class="step-num" id="n-spk">— Speakers</span><button class="change-btn" onclick="resetFrom('s-spk')">change</button></div>
          <div class="btn-group" id="g-spk"></div>
        </div>
      </div>
      <div class="step" id="s-sub" style="display:none;">
        <div class="step-inner">
          <div class="step-header"><span class="step-num" id="n-sub">— Subwoofers</span><button class="change-btn" onclick="resetFrom('s-sub')">change</button></div>
          <div class="btn-group" id="g-sub"></div>
        </div>
      </div>
    </div>
    <div class="result-wrap" id="result-area"></div>
  </div>
  <div class="sub-detail-page" id="sub-detail-page">
    <div class="sub-detail-header">
      <button class="sub-detail-back" onclick="closeSubDetail()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back
      </button>
      <div class="sub-detail-eyebrow">Suggested Subwoofer</div>
      <div class="sub-detail-title" id="sub-detail-title"></div>
    </div>
    <div class="sub-detail-divider"></div>
    <div class="sub-detail-content" id="sub-detail-content"></div>
  </div>
  <div class="project-panel" id="project-panel">
    <div class="project-header">
      <button class="project-back" onclick="closeProject()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back
      </button>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;">
        <div>
          <div class="project-eyebrow">My Project</div>
          <div class="project-title">Selected Amplifiers</div>
        </div>
        <button onclick="clearProject()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;border-radius:6px;cursor:pointer;margin-bottom:4px;transition:all 0.15s;" onmouseover="this.style.borderColor='#c0464a';this.style.color='#c0464a'" onmouseout="this.style.borderColor='';this.style.color=''">Clear All</button>
      </div>
    </div>
    <div class="project-divider"></div>
    <div class="project-content" id="project-content"></div>
  </div>
  <div class="wiring-panel" id="wiring-panel">
    <div class="sub-detail-header">
      <button class="sub-detail-back" onclick="closeWiring()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back
      </button>
      <div class="sub-detail-eyebrow">Connection Guide</div>
      <div class="sub-detail-title" id="wiring-panel-title"></div>
    </div>
    <div class="sub-detail-divider"></div>
    <div id="wiring-root" style="flex:1;width:100%;height:100%;min-height:0;position:relative;overflow:hidden;"></div>
  </div>
  <div class="bottom-toolbar">
    <button class="add-project-btn" id="add-project-btn" onclick="addToProject()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add to Project
    </button>
    <div class="toolbar-row">
      <button class="tool-btn" id="back-btn" onclick="goBack()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back
      </button>
      <button class="tool-btn reset-btn" id="reset-btn" onclick="fullReset()" disabled>
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>Reset
      </button>
    </div>
  </div>
</div>

function mergeAmps(list){
  // Group by wattage family (125, 250, 1000, 1200); pass through anything that doesn't match X.1/X.2/X.4
  const groups={};const unmatched=[];
  for(const amp of list){const m=amp.match(/^(\d+)\.(1|2|4)$/);if(m){const w=m[1];if(!groups[w])groups[w]={n1:0,n2:0,n4:0};groups[w]['n'+m[2]]++;}else{unmatched.push(amp);}}
  const result=[...unmatched];
  for(const [watt,g] of Object.entries(groups)){
    let{n1,n2,n4}=g;
    // Apply rules iteratively until no more merges possible:
    // Rule 1: .1+.1 → .2  |  Rule 2: .1+.2 → .4  |  Rule 3: .2+.2 → .4
    let changed=true;
    while(changed){
      changed=false;
      if(n1>=2){n2+=Math.floor(n1/2);n1=n1%2;changed=true;}
      if(n2>=2){n4+=Math.floor(n2/2);n2=n2%2;changed=true;}
      if(n1>=1&&n2>=1){n4++;n1--;n2--;changed=true;}
    }
    for(let i=0;i<n4;i++)result.push(watt+'.4');
    for(let i=0;i<n2;i++)result.push(watt+'.2');
    for(let i=0;i<n1;i++)result.push(watt+'.1');
  }
  result.sort((a,b)=>parseFloat(a)-parseFloat(b));
  return result;
}

    var nodeMinW=Math.max(side?100:110,n*chW);
    return h('div',{style:{background:'linear-gradient(135deg,rgba(77,158,246,0.18),rgba(77,158,246,0.06))',border:'1.5px solid rgba(77,158,246,0.5)',borderRadius:12,padding:side?'10px 18px 10px 14px':'10px 14px 22px',color:'#fff',fontFamily:'"DM Serif Display",serif',fontSize:17,textAlign:'center',minWidth:nodeMinW,position:'relative',boxShadow:'0 4px 24px rgba(77,158,246,0.18)'}},
      h('div',{style:{fontSize:9,letterSpacing:'0.13em',textTransform:'uppercase',color:'rgba(77,158,246,0.8)',marginBottom:3,fontFamily:'"DM Sans",sans-serif'}},'Amplifier'),
      h('div',null,'ProA '+data.model),
      h('div',{style:{display:'flex',justifyContent:'space-around',marginTop:7,gap:1}},
        data.channels.map(function(ch,i){return h('div',{key:i,style:{flex:1,textAlign:'center'}},
          h('div',{style:{fontSize:8,color:ch.active?ch.color:'rgba(255,255,255,0.18)',fontFamily:'"DM Sans",sans-serif',letterSpacing:'0.04em'}},'CH'+(i+1)),
          h('div',{style:{fontSize:7,color:ch.active?'rgba(255,255,255,0.65)':'rgba(255,255,255,0.12)',fontFamily:'"DM Sans",sans-serif',marginTop:1}},ch.watt)
        );})
      ),
      data.channels.map(function(ch,i){
        var hStyle=side
          ?{top:((i+0.5)/n*100)+'%',right:-5,background:ch.active?ch.color:'rgba(255,255,255,0.1)',width:10,height:10,border:'2px solid #0d0f14',opacity:ch.active?1:0.25}
          :{left:((i+0.5)/n*100)+'%',background:ch.active?ch.color:'rgba(255,255,255,0.1)',width:10,height:10,border:'2px solid #0d0f14',bottom:-5,opacity:ch.active?1:0.25};
        return h(Handle,{key:'h'+i,type:'source',position:side?Position.Right:Position.Bottom,id:ch.id,style:hStyle});
      })
    );
  }
  function SpeakerNode(props){
    var data=props.data,side=data.side;
    return h('div',{style:{background:'rgba(255,255,255,0.035)',border:'1.5px solid '+data.color+'55',borderRadius:10,padding:'14px 10px 10px',color:'#ddd',fontFamily:'"DM Sans",sans-serif',fontSize:11,textAlign:'center',minWidth:62,boxShadow:'0 2px 12px '+data.color+'18',position:'relative'}},
      h(Handle,{type:'target',position:side?Position.Left:Position.Top,id:'in',style:side?{background:data.color,width:10,height:10,border:'2px solid #0d0f14',left:-5}:{background:data.color,width:10,height:10,border:'2px solid #0d0f14',top:-5}}),
      data.type?h('div',{style:{fontSize:8,letterSpacing:'0.09em',textTransform:'uppercase',color:'rgba(255,255,255,0.28)',marginBottom:3}},data.type):null,
      h('div',{style:{fontWeight:500}},data.label)
    );
  }
  function SubNode(props){
    var data=props.data;
    return h('div',{style:{background:'rgba(246,160,32,0.08)',border:'1.5px solid rgba(246,160,32,0.5)',borderRadius:10,padding:'14px 10px 10px',color:'#ddd',fontFamily:'"DM Sans",sans-serif',fontSize:11,textAlign:'center',minWidth:62,boxShadow:'0 2px 12px rgba(246,160,32,0.15)',position:'relative'}},
      h(Handle,{type:'target',position:Position.Top,id:'in',style:{background:'#f6a020',width:10,height:10,border:'2px solid #0d0f14',top:-5}}),
      h('div',{style:{fontSize:8,letterSpacing:'0.09em',textTransform:'uppercase',color:'rgba(246,160,32,0.7)',marginBottom:3}},'Sub'),
      h('div',{style:{fontWeight:500}},data.label)
    );
  }
  var nodeTypes={ampNode:AmpNode,speakerNode:SpeakerNode,subNode:SubNode};
  function buildGraph(ampStr,spkVal,ohm,cat,subCount,prod){
    var parts=ampStr.split('+').map(function(s){return s.trim();});
    var isBar=cat==='Soundbars';
    var spkItems;
    if(isBar){spkItems=spkVal==='LCR'?[{l:'Left',t:'L'},{l:'Center',t:'C'},{l:'Right',t:'R'}]:spkVal==='L&R'?[{l:'Left',t:'L'},{l:'Right',t:'R'}]:[{l:'Soundbar',t:''}];}
    else{var ns=parseInt(spkVal)||2;spkItems=[];for(var si2=0;si2<ns;si2++)spkItems.push({l:'Spk '+(si2+1),t:'',nodeType:'speakerNode'});}
    var numSubs=parseInt(subCount)||0;
    var subItems=[];
    for(var sb=0;sb<numSubs;sb++)subItems.push({l:'Sub '+(sb+1),t:'',nodeType:'subNode'});
    // Combined output list: speakers first, then subs
    var allOutputs=[];
    spkItems.forEach(function(s){allOutputs.push(s);});
    subItems.forEach(function(s){allOutputs.push(s);});
    // Phase 1: build channels and allActive (with chRef) — do NOT push amp nodes yet
    var allActive=[],ampData=[],nodes=[],CW=320;
    var SLOT=numSubs>0?300:220; // extra vertical room when subs are present
    parts.forEach(function(model,ai){
      var spec=AMP_SPECS[model],chCount=spec?spec.ch:2;
      var chSpecs=getChSpecs(model,ohm);
      var channels=[];
      for(var ci=0;ci<chCount;ci++){
        var watt=chSpecs[ci];
        var active=watt!==null&&watt!==undefined&&watt!=='DNU';
        var ch={id:'ch-'+ai+'-'+ci,watt:watt||'—',active:active,color:CH_COLORS[allActive.length%CH_COLORS.length]};
        if(active)allActive.push({id:ch.id,color:ch.color,ampId:'amp-'+ai,model:model,chRef:ch});
        channels.push(ch);
      }
      ampData.push({model:model,channels:channels,ai:ai});
    });
    var is70v=ohm==='70v';
    var spkW=64,spkGap=10,edges=[];
    // Phase 2: Assign outputs using pool+pointer so DNU-paired channels can be removed mid-loop
    var groups={};
    parts.forEach(function(_,ai){groups['amp-'+ai]={spks:[],subs:[]};});
    var pool=allActive.slice(),ptr=0;
    // For 70v with subs: speakers always on CH1 (first active channel),
    // subs always on CH3 (second active channel). Never shared.
    var spkPool70=null,subPool70=null,spkPtr70=0,subPtr70=0;
    if(is70v&&numSubs>0&&pool.length>0){
      spkPool70=[pool[0]]; // CH1 — all speakers
      subPool70=pool.length>1?[pool[1]]:[pool[0]]; // CH3 — all subs (fallback CH1 if only 1 channel)
    }
    allOutputs.forEach(function(out,oi){
      var isSub=out.nodeType==='subNode';
      // ASM5600 speakers are bridged — each speaker uses 2 channels
      var needCh=(!isSub&&prod==='ASM5600')?2:1;
      var assignedChs=[];
      for(var nc=0;nc<needCh;nc++){
        var pch=null;
        if(spkPool70){
          // 70v with subs: use dedicated speaker or sub pool — never shared
          if(isSub){
            if(subPool70.length>0){pch=subPool70[subPtr70%subPool70.length];subPtr70++;}
          } else {
            if(spkPool70.length>0){pch=spkPool70[spkPtr70%spkPool70.length];spkPtr70++;}
          }
        } else {
          // Standard round-robin
          if(pool.length===0)break;
          var poolPos=ptr%pool.length;
          pch=pool[poolPos];
          ptr++;
          // Sub on a 250.x amp: show 250w, DNU-grey the bridged pair channel
          if(isSub&&pch&&pch.model&&/^250\./.test(pch.model)){
            pch.chRef.watt='250w';
            if(pool.length>0){
              var nextPos=ptr%pool.length;
              if(pool[nextPos]&&pool[nextPos].ampId===pch.ampId){
                var pair=pool[nextPos];
                pair.chRef.watt='DNU';
                pair.chRef.active=false;
                pool.splice(nextPos,1);
              }
            }
          }
        }
        if(pch)assignedChs.push(pch);
      }
      var ch=assignedChs[0]||null;
      var ampId=ch?ch.ampId:'amp-0';
      if(!groups[ampId])groups[ampId]={spks:[],subs:[]};
      var entry={out:out,oi:oi,ch:ch,assignedChs:assignedChs};
      if(isSub)groups[ampId].subs.push(entry);
      else groups[ampId].spks.push(entry);
    });
    // Calculate per-amp Y positions (dynamic — 70v speakers stack vertically and need more room)
    var spkSlotH=78; // vertical step per speaker in 70v mode
    var ampYPos=[];
    var yAccum=20;
    parts.forEach(function(_,ai){
      ampYPos.push(yAccum);
      var grp=groups['amp-'+ai]||{spks:[],subs:[]};
      var slotH;
      if(is70v){
        slotH=115+Math.max(1,grp.spks.length)*spkSlotH+(grp.subs.length>0?spkSlotH:0)+30;
      } else {
        slotH=SLOT;
      }
      yAccum+=slotH;
    });
    // Phase 3: Now push amp nodes (channels[] have corrected wattages)
    var ampLeftX=8; // left column x for 70v side layout
    var spkRightX=245; // right column x for 70v side layout
    ampData.forEach(function(ad){
      var chCount=ad.channels.length;
      var ampX,ampY=ampYPos[ad.ai];
      if(is70v){
        // Center amp vertically relative to its speaker group
        var grp=groups['amp-'+ad.ai]||{spks:[],subs:[]};
        var spkCount=grp.spks.length;
        var groupH=Math.max(1,spkCount)*spkSlotH;
        ampX=ampLeftX;
        ampY=ampYPos[ad.ai]+(groupH/2)-40; // -40 to roughly center the amp node
      } else {
        var nodeW=Math.max(110,chCount*40);
        ampX=CW/2-nodeW/2;
      }
      nodes.push({id:'amp-'+ad.ai,type:'ampNode',position:{x:ampX,y:ampY},data:{model:ad.model,channels:ad.channels,side:is70v},draggable:false,selectable:false});
    });
    // Render each amp's speakers then subs directly below it
    parts.forEach(function(_,ai){
      var ampId='amp-'+ai;
      var grp=groups[ampId];
      var ampY=ampYPos[ai];
      // Speakers
      var spkRow=grp.spks;
      if(spkRow.length>0){
        if(is70v){
          // 70v: speakers stacked vertically in right column, all same color
          var vy=ampYPos[ai];
          var spk70Color='#4d9ef6'; // uniform blue for all 70v speakers
          spkRow.forEach(function(e,gi){
            nodes.push({id:'out-'+e.oi,type:'speakerNode',position:{x:spkRightX,y:vy+gi*spkSlotH},data:{label:e.out.l,type:e.out.t||'',color:spk70Color,side:true},draggable:false,selectable:false});
            (e.assignedChs||[e.ch]).forEach(function(ach,ei){
              if(ach)edges.push({id:'edge-'+e.oi+'-'+ei,source:ach.ampId,target:'out-'+e.oi,sourceHandle:ach.id,targetHandle:'in',type:'smoothstep',style:{stroke:spk70Color,strokeWidth:2.5},markerEnd:{type:MarkerType.ArrowClosed,color:spk70Color,width:14,height:14}});
            });
          });
        } else {
          // Standard: speakers in a horizontal row
          var rw=spkRow.length*spkW+(spkRow.length-1)*spkGap;
          var rx=Math.max(0,(CW-rw)/2);
          var sy=ampY+115;
          spkRow.forEach(function(e,gi){
            var color=e.ch?e.ch.color:'#555';
            nodes.push({id:'out-'+e.oi,type:'speakerNode',position:{x:rx+gi*(spkW+spkGap),y:sy},data:{label:e.out.l,type:e.out.t||'',color:color},draggable:false,selectable:false});
            (e.assignedChs||[e.ch]).forEach(function(ach,ei){
              if(ach)edges.push({id:'edge-'+e.oi+'-'+ei,source:ach.ampId,target:'out-'+e.oi,sourceHandle:ach.id,targetHandle:'in',type:'smoothstep',style:{stroke:ach.color,strokeWidth:2.5},markerEnd:{type:MarkerType.ArrowClosed,color:ach.color,width:14,height:14}});
            });
          });
        }
      }
      // Subs row (always horizontal, below speakers)
      var subRow=grp.subs;
      if(subRow.length>0){
        var subOffsetY=is70v?spkRow.length*spkSlotH:( spkRow.length>0?85:0);
        var sw=subRow.length*spkW+(subRow.length-1)*spkGap;
        var sx=Math.max(0,(CW-sw)/2);
        var sby=ampY+115+subOffsetY;
        subRow.forEach(function(e,gi){
          var color='#f6a020';
          nodes.push({id:'out-'+e.oi,type:'subNode',position:{x:sx+gi*(spkW+spkGap),y:sby},data:{label:e.out.l,color:color},draggable:false,selectable:false});
          if(e.ch)edges.push({id:'edge-'+e.oi,source:e.ch.ampId,target:'out-'+e.oi,sourceHandle:e.ch.id,targetHandle:'in',type:'smoothstep',style:{stroke:'#f6a020',strokeWidth:2.5},markerEnd:{type:MarkerType.ArrowClosed,color:'#f6a020',width:14,height:14}});
        });
      }
    });
    return{nodes:nodes,edges:edges};
  }
  function WiringDiagram(props){
    var g=buildGraph(props.ampStr,props.spkVal,props.ohm||'8ohm',props.cat,props.subCount||0,props.prod||'');
    var ns=useNodesState(g.nodes),es=useEdgesState(g.edges);
    return h(ReactFlow,{nodes:ns[0],edges:es[0],nodeTypes:nodeTypes,onNodesChange:ns[2],onEdgesChange:es[2],
      fitView:true,fitViewOptions:{padding:0.28,maxZoom:1.2},
      panOnDrag:true,zoomOnScroll:false,zoomOnPinch:true,
      nodesDraggable:false,nodesConnectable:false,elementsSelectable:false,
      proOptions:{hideAttribution:true},style:{background:'#0d0f14',width:'100%',height:'100%'}},
      h(Background,{color:'rgba(255,255,255,0.05)',gap:22,size:1})
    );
  }
  var _wRoot=null;
  window._mountWiringDiagram=function(el,data){
    try{if(_wRoot)_wRoot.unmount();}catch(e){}
    el.innerHTML='';
    _wRoot=RD.createRoot(el);
    _wRoot.render(h(WiringDiagram,data));
    window._pendingWiringMount=null;
  };
  if(window._pendingWiringMount){var pw=window._pendingWiringMount;window._mountWiringDiagram(pw.el,pw.d);}
})();
</script>
